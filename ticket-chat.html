<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Chat</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #0b1020;
      --panel: #121933;
      --border: rgba(255,255,255,.08);
      --text: #eef2ff;
      --muted: #94a3b8;
      --primary: #4f46e5;
      --primary-2: #6d28d9;
      --customer: #1a2242;
      --danger-bg: rgba(239,68,68,.12);
      --danger-border: rgba(239,68,68,.28);
      --danger-text: #fecaca;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79,70,229,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(109,40,217,.14), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px;
    }

    .chat-shell {
      width: 100%;
      max-width: 430px;
      height: min(92vh, 860px);
      background: rgba(18,25,51,.98);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: linear-gradient(135deg, #4f46e5 0%, #4338ca 42%, #6d28d9 100%);
      color: #fff;
      padding: 18px 16px 14px;
      flex-shrink: 0;
    }

    .topbar h1 {
      margin: 0 0 8px;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 800;
    }

    .topbar-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .mini-badge.status-open {
      background: rgba(59,130,246,.16);
      color: #dbeafe;
      border-color: rgba(147,197,253,.2);
    }

    .mini-badge.status-closed {
      background: rgba(239,68,68,.16);
      color: #fecaca;
      border-color: rgba(252,165,165,.2);
    }

    .messages-wrap {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,.02);
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-row {
      display: flex;
      width: 100%;
    }

    .msg-row.customer {
      justify-content: flex-start;
    }

    .msg-row.support {
      justify-content: flex-end;
    }

    .bubble {
      width: auto;
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 18px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      box-shadow: 0 6px 18px rgba(0,0,0,.16);
    }

    .bubble.customer {
      background: var(--customer);
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,.05);
      border-bottom-left-radius: 8px;
    }

    .bubble.support {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border: 1px solid rgba(255,255,255,.08);
      border-bottom-right-radius: 8px;
    }

    .bubble-header {
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 6px;
      opacity: .88;
    }

    .bubble-time {
      margin-top: 7px;
      font-size: 10px;
      color: rgba(255,255,255,.65);
    }

    .loading,
    .not-found {
      text-align: center;
      padding: 28px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .closed-box {
      margin-top: 10px;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger-text);
      padding: 12px 13px;
      border-radius: 14px;
      font-weight: 700;
      line-height: 1.5;
      font-size: 12px;
    }

    .reply-box {
      border-top: 1px solid var(--border);
      padding: 10px;
      background: rgba(11,16,32,.96);
      flex-shrink: 0;
    }

    .composer {
      position: relative;
    }

    .reply-box textarea {
      width: 100%;
      min-height: 78px;
      max-height: 170px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 12px 110px 12px 14px;
      font-size: 13px;
      font-family: Inter, Arial, sans-serif;
      outline: none;
      background: #0b1020;
      color: white;
      line-height: 1.5;
    }

    .reply-box textarea::placeholder {
      color: #94a3b8;
    }

    .reply-box textarea:focus {
      border-color: rgba(99,102,241,.85);
      box-shadow: 0 0 0 4px rgba(99,102,241,.14);
    }

    .send-inside {
      position: absolute;
      right: 8px;
      bottom: 8px;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      min-width: 90px;
    }

    .send-inside:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .reply-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      min-height: 42px;
    }

    .btn.secondary {
      background: #111827;
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
      min-width: 88px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      background: #111827;
      color: #fff;
      border: 1px dashed rgba(255,255,255,.18);
      min-height: 42px;
    }

    .file-input {
      display: none;
    }

    .notice {
      margin-top: 10px;
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .footer-note {
      padding: 0 10px 10px;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
      flex-shrink: 0;
      text-align: center;
    }

    @media (max-width: 480px) {
      .page {
        padding: 0;
      }

      .chat-shell {
        max-width: 100%;
        min-height: 100vh;
        height: 100vh;
        border-radius: 0;
      }

      .topbar {
        padding: 16px 14px 12px;
      }

      .topbar h1 {
        font-size: 18px;
      }

      .messages-wrap {
        padding: 12px 10px;
      }

      .bubble {
        max-width: 86%;
      }

      .reply-actions {
        gap: 7px;
      }

      .btn.secondary,
      .file-label {
        min-width: unset;
      }

      .reply-box textarea {
        padding-right: 98px;
      }

      .send-inside {
        min-width: 82px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="chat-shell">
      <div class="topbar">
        <h1>Support Ticket</h1>
        <div class="topbar-meta">
          <div class="mini-badge" id="ticketIdBadge">Ticket: --</div>
          <div class="mini-badge" id="statusBadge">Status: --</div>
        </div>
      </div>

      <div class="messages-wrap">
        <div id="loading" class="loading">Loading ticket...</div>
        <div id="notFound" class="not-found" style="display:none;">Ticket not found.</div>
        <div id="chatList" class="chat-list" style="display:none;"></div>

        <div id="closedBox" class="closed-box" style="display:none;">
          This ticket is closed. You can no longer send messages.
        </div>
      </div>

      <div id="replyBox" class="reply-box" style="display:none;">
        <div class="composer">
          <textarea id="replyMessage" placeholder="Write your message here..."></textarea>
          <button id="sendBtn" class="send-inside">Send</button>
        </div>

        <div class="reply-actions">
          <label class="file-label" for="fileInput">
            Attach files
          </label>
          <input
            id="fileInput"
            class="file-input"
            type="file"
            multiple
            accept=".png,.jpg,.jpeg,.pdf,.doc,.docx"
          />

          <button id="refreshBtn" class="btn secondary" type="button">Refresh</button>
        </div>

        <div id="fileNames" class="notice"></div>
        <div id="replyNotice" class="notice"></div>
      </div>

      <div class="footer-note">
        Keep this link private.
      </div>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7DzUBQu_foss2Q28P_aEEyWHA7k7-dpKOlJtXS-7Sgm0AXlB6zklULk4CXp77CRX1G8IBqTnQ6avP/pub?output=csv";
    const REPLY_WEBHOOK_URL = "PUT_YOUR_REPLY_WEBHOOK_HERE";

    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("ticket");

    const ticketIdBadge = document.getElementById("ticketIdBadge");
    const statusBadge = document.getElementById("statusBadge");
    const loadingEl = document.getElementById("loading");
    const notFoundEl = document.getElementById("notFound");
    const chatList = document.getElementById("chatList");
    const closedBox = document.getElementById("closedBox");
    const replyBox = document.getElementById("replyBox");
    const replyMessage = document.getElementById("replyMessage");
    const sendBtn = document.getElementById("sendBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const replyNotice = document.getElementById("replyNotice");
    const fileInput = document.getElementById("fileInput");
    const fileNames = document.getElementById("fileNames");

    let currentTicket = null;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(current);
          current = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(current);
          rows.push(row);
          row = [];
          current = "";
        } else {
          current += char;
        }
      }

      if (current.length > 0 || row.length > 0) {
        row.push(current);
        rows.push(row);
      }

      return rows.filter(r => r.some(cell => String(cell).trim() !== ""));
    }

    function rowsToObjects(rows) {
      const headers = rows[0].map(h => String(h).trim());
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = String(row[index] || "").trim();
        });
        return obj;
      });
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderStatusBadge(status) {
      const s = String(status || "").toUpperCase();
      if (s === "OPEN") {
        statusBadge.className = "mini-badge status-open";
        statusBadge.textContent = "Status: OPEN";
      } else if (s === "CLOSED") {
        statusBadge.className = "mini-badge status-closed";
        statusBadge.textContent = "Status: CLOSED";
      } else {
        statusBadge.className = "mini-badge";
        statusBadge.textContent = `Status: ${s || "--"}`;
      }
    }

    function renderTicket(ticket) {
      currentTicket = ticket;

      ticketIdBadge.textContent = `Ticket: ${ticket.ticket_id || "--"}`;
      renderStatusBadge(ticket.status);

      loadingEl.style.display = "none";
      chatList.style.display = "flex";

      const isClosed = String(ticket.status || "").toUpperCase() === "CLOSED";

      if (isClosed) {
        closedBox.style.display = "block";
        replyBox.style.display = "none";
      } else {
        closedBox.style.display = "none";
        replyBox.style.display = "block";
      }

      const messages = [];

      if (ticket.message) {
        messages.push({
          sender: ticket.name || "You",
          type: "customer",
          text: ticket.message,
          time: ticket.response_deadline || ""
        });
      }

      if (ticket.auto_reply) {
        messages.push({
          sender: "Support Team",
          type: "support",
          text: ticket.auto_reply,
          time: ""
        });
      }

      chatList.innerHTML = messages.map(msg => `
        <div class="msg-row ${msg.type}">
          <div class="bubble ${msg.type}">
            <div class="bubble-header">${escapeHtml(msg.sender)}</div>
            <div>${escapeHtml(msg.text)}</div>
            <div class="bubble-time">${escapeHtml(msg.time)}</div>
          </div>
        </div>
      `).join("");
    }

    async function loadTicket() {
      loadingEl.style.display = "block";
      notFoundEl.style.display = "none";
      chatList.style.display = "none";
      closedBox.style.display = "none";
      replyBox.style.display = "none";
      replyNotice.textContent = "";
      fileNames.textContent = "";

      if (!ticketId) {
        loadingEl.style.display = "none";
        notFoundEl.style.display = "block";
        ticketIdBadge.textContent = "Ticket: --";
        statusBadge.textContent = "Status: --";
        return;
      }

      try {
        const response = await fetch(SHEET_CSV_URL + "&t=" + Date.now());
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        const objects = rowsToObjects(rows);

        const ticket = objects.find(row => String(row.ticket_id).trim() === String(ticketId).trim());

        if (!ticket) {
          loadingEl.style.display = "none";
          notFoundEl.style.display = "block";
          ticketIdBadge.textContent = `Ticket: ${ticketId}`;
          statusBadge.textContent = "Status: --";
          return;
        }

        renderTicket(ticket);
      } catch (error) {
        loadingEl.style.display = "none";
        notFoundEl.style.display = "block";
        ticketIdBadge.textContent = "Ticket: --";
        statusBadge.textContent = "Status: --";
      }
    }

    fileInput.addEventListener("change", () => {
      const files = Array.from(fileInput.files || []);
      if (!files.length) {
        fileNames.textContent = "";
        return;
      }

      fileNames.textContent = "Selected files: " + files.map(file => file.name).join(", ");
    });

    async function sendReply() {
      const message = replyMessage.value.trim();

      if (!message) {
        replyNotice.textContent = "Please write a message first.";
        return;
      }

      if (!currentTicket) {
        replyNotice.textContent = "Ticket data is missing.";
        return;
      }

      if (String(currentTicket.status || "").toUpperCase() === "CLOSED") {
        replyNotice.textContent = "This ticket is closed.";
        return;
      }

      if (REPLY_WEBHOOK_URL === "PUT_YOUR_REPLY_WEBHOOK_HERE") {
        replyNotice.textContent = "Reply webhook is not set yet.";
        return;
      }

      const files = Array.from(fileInput.files || []);
      const attachments = files.map(file => ({
        name: file.name,
        type: file.type || "unknown",
        size: file.size
      }));

      sendBtn.disabled = true;
      replyNotice.textContent = "Sending reply...";

      try {
        const response = await fetch(REPLY_WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ticket_id: currentTicket.ticket_id,
            name: currentTicket.name,
            email: currentTicket.email,
            message: message,
            attachments: attachments
          })
        });

        if (!response.ok) {
          throw new Error("Failed");
        }

        replyMessage.value = "";
        fileInput.value = "";
        fileNames.textContent = "";
        replyNotice.textContent = "Reply sent successfully.";
      } catch (error) {
        replyNotice.textContent = "Something went wrong while sending your reply.";
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendReply);
    refreshBtn.addEventListener("click", loadTicket);

    loadTicket();
  </script>
</body>
</html>
