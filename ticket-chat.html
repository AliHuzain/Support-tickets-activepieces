<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Chat</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Inter,Arial;
background:#0b1020;
color:white;
}

.page{
display:flex;
justify-content:center;
min-height:100vh;
}

.chat-shell{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
background:#121933;
}

.topbar{
background:linear-gradient(135deg,#4f46e5,#6d28d9);
padding:16px;
}

.topbar h1{
margin:0 0 8px;
font-size:18px;
}

.topbar-meta{
display:flex;
gap:8px;
}

.badge{
padding:6px 10px;
border-radius:20px;
background:rgba(255,255,255,.15);
font-size:12px;
}

.messages-wrap{
flex:1;
overflow:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:10px;
}

.bubble{
display:inline-block;
width:auto;
max-width:80%;
padding:10px 12px;
border-radius:16px;
font-size:13px;
line-height:1.5;
word-break:break-word;
}

.customer{
align-self:flex-start;
background:#1a2242;
}

.support{
align-self:flex-end;
background:linear-gradient(135deg,#4f46e5,#6d28d9);
}

.bubble-header{
font-size:11px;
opacity:.8;
margin-bottom:6px;
}

.bubble-time{
font-size:10px;
opacity:.6;
margin-top:6px;
}

.reply-box{
padding:10px;
border-top:1px solid rgba(255,255,255,.08);
background:#0b1020;
}

.composer{
position:relative;
}

textarea{
width:100%;
border-radius:16px;
border:1px solid rgba(255,255,255,.1);
background:#0b1020;
color:white;
padding:12px 90px 12px 12px;
font-size:13px;
resize:none;
}

.send-btn{
position:absolute;
right:6px;
bottom:6px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4f46e5,#6d28d9);
color:white;
padding:8px 16px;
font-weight:700;
cursor:pointer;
}

.actions{
margin-top:10px;
display:flex;
gap:8px;
}

.btn{
border:none;
border-radius:12px;
padding:10px 14px;
background:#111827;
color:white;
font-size:12px;
cursor:pointer;
}

.file-input{
display:none;
}

.file-label{
border-radius:12px;
padding:10px 14px;
background:#111827;
cursor:pointer;
font-size:12px;
}

.footer{
text-align:center;
font-size:11px;
padding:6px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="page">

<div class="chat-shell">

<div class="topbar">
<h1>Support Ticket</h1>

<div class="topbar-meta">
<div class="badge" id="ticketIdBadge">Ticket: --</div>
<div class="badge" id="statusBadge">Status: --</div>
</div>

</div>

<div class="messages-wrap" id="chatList"></div>

<div class="reply-box">

<div class="composer">

<textarea id="replyMessage" placeholder="Write your message here..."></textarea>

<button class="send-btn" id="sendBtn">Send</button>

</div>

<div class="actions">

<label class="file-label" for="fileInput">Attach files</label>
<input type="file" id="fileInput" class="file-input" multiple>

<button class="btn" id="refreshBtn">Refresh</button>

</div>

</div>

<div class="footer">
Keep this link private
</div>

</div>
</div>

<script>

const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7DzUBQu_foss2Q28P_aEEyWHA7k7-dpKOlJtXS-7Sgm0AXlB6zklULk4CXp77CRX1G8IBqTnQ6avP/pub?output=csv"

const REPLY_WEBHOOK_URL="PUT_YOUR_REPLY_WEBHOOK_HERE"

const params=new URLSearchParams(window.location.search)
const ticketId=params.get("ticket")

const chatList=document.getElementById("chatList")
const ticketIdBadge=document.getElementById("ticketIdBadge")
const statusBadge=document.getElementById("statusBadge")
const sendBtn=document.getElementById("sendBtn")
const replyMessage=document.getElementById("replyMessage")
const refreshBtn=document.getElementById("refreshBtn")

let currentTicket=null

function parseCSV(text){

const rows=[]
let row=[]
let current=""
let inQuotes=false

for(let i=0;i<text.length;i++){

const char=text[i]
const next=text[i+1]

if(char=='"'){

if(inQuotes && next=='"'){
current+='"'
i++
}else{
inQuotes=!inQuotes
}

}else if(char=="," && !inQuotes){

row.push(current)
current=""

}else if((char=="\n"||char=="\r")&&!inQuotes){

row.push(current)
rows.push(row)
row=[]
current=""

}else{

current+=char

}

}

row.push(current)
rows.push(row)

return rows

}

function rowsToObjects(rows){

const headers=rows[0]

return rows.slice(1).map(row=>{

const obj={}

headers.forEach((h,i)=>{
obj[h]=row[i]
})

return obj

})

}

function renderTicket(ticket){

currentTicket=ticket

ticketIdBadge.textContent="Ticket: "+ticket.ticket_id
statusBadge.textContent="Status: "+ticket.status

const messages=[]

if(ticket.message){

messages.push({
sender:ticket.name,
type:"customer",
text:ticket.message,
time:ticket.response_deadline
})

}

if(ticket.auto_reply){

messages.push({
sender:"Support Team",
type:"support",
text:ticket.auto_reply,
time:""
})

}

chatList.innerHTML=messages.map(msg=>`

<div class="bubble ${msg.type}">
<div class="bubble-header">${msg.sender}</div>
<div>${msg.text}</div>
<div class="bubble-time">${msg.time||""}</div>
</div>

`).join("")

chatList.scrollTop=chatList.scrollHeight

}

async function loadTicket(){

const res=await fetch(SHEET_CSV_URL+"&t="+Date.now())
const text=await res.text()

const rows=parseCSV(text)
const data=rowsToObjects(rows)

const ticket=data.find(t=>t.ticket_id==ticketId)

if(ticket) renderTicket(ticket)

}

async function sendReply(){

const message=replyMessage.value.trim()

if(!message) return

await fetch(REPLY_WEBHOOK_URL,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
ticket_id:currentTicket.ticket_id,
message:message
})
})

replyMessage.value=""

}

sendBtn.onclick=sendReply
refreshBtn.onclick=loadTicket

loadTicket()

</script>

</body>
</html>
